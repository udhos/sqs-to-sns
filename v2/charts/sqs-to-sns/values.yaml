# Default values for sqs-to-sns.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: udhos/sqs-to-sns
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# add labels to deploy (not to PODs)
deployLabels: {}
  # tags.datadoghq.com/env: dev
  # tags.datadoghq.com/service: sqs-to-sns
  # tags.datadoghq.com/version: 2.0.1

# add custom labels to deployment pods
customLabels:
  app: sqs-to-sns

# redeploy:
#
# 'always': adds a random annotation to Deployment in
#           order to redeploy the pods whenever the chart is reapplied.
#
# 'reconfig': adds annotations with checksums of configurations in
#             order to redeploy the pods whenever configuration is changed.
#
# https://v3.helm.sh/docs/howto/charts_tips_and_tricks/#automatically-roll-deployments
#
redeploy: always

podAnnotations:
  prometheus.io/path: /metrics
  prometheus.io/port: "3000"
  prometheus.io/scrape: "true"
  sidecar.istio.io/inject: "false"

podHealthCheck:
  port: 8080
  path: /health

#
# See: https://stackoverflow.com/questions/72816925/helm-templating-in-configmap-for-values-yaml
#
configMapProperties:
  AUTOMEMLIMIT_DEBUG: "true"
  LOG_LEVEL: info
  LOG_JSON: "true"
  LOG_MESSAGE_BODY: "false"
  QUEUES: /etc/sqs-to-sns/queues.yaml
  ENDPOINT_URL: ""
  EXIT_DELAY: 5s
  FLUSH_INTERVAL_PUBLISH: 500ms
  FLUSH_INTERVAL_DELETE: 1s
  AWS_API_TIMEOUT: 30s
  #
  # health checks (use for livenessProbe only, not for readinessProbe)
  #
  HEALTH_ADDR: :8080
  HEALTH_PATH: /health
  #
  # dogstatsd metrics
  #
  DOGSTATSD_ENABLE: "false"
  DOGSTATSD_INTERVAL: 20s
  DOGSTATSD_NAMESPACE: sqstosns
  DOGSTATSD_SAMPLE_RATE: "1.0"
  DD_AGENT_HOST: localhost
  DD_SERVICE: sqs-to-sns

configDir:
  queues.yaml: |
    - id: q1
      #
      # required:
      #
      queue_url: https://sqs.us-east-1.amazonaws.com/111111111111/queue_name1
      topic_arn: arn:aws:sns:us-east-1:222222222222:topic_name1
      #
      # optional:
      #
      # queue_role_arn: ""
      # topic_role_arn: ""
      # buffer_size_publish: 1000
      # buffer_size_delete: 1000
      # limit_readers: 50
      # limit_publishers: 50
      # limit_deleters: 50
      # max_number_of_messages: 10 # 1..10 (default 10)
      # wait_time_seconds: 20      # 0..20 (default 20)
      # copy_attributes: true
      # copy_message_group_id: true
      # empty_receive_cooldown: 1s
      # receive_error_cooldown: 1s
      # publish_error_cooldown: 1s
      # delete_error_cooldown: 1s

resources:
  requests:
    cpu: 300m
    memory: 100Mi
    ephemeral-storage: 1Gi
  limits:
    cpu: 2000m
    memory: 200Mi
    ephemeral-storage: 1Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  apiVersion: autoscaling/v2

nodeSelector: {}

tolerations: []

affinity: {}
